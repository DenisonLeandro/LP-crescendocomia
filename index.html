    // CountUp number component using requestAnimationFrame & IntersectionObserver
    function CountUpNumber({ target, prefix = '', suffix = '', duration = 2000, format = false }) {
      const [count, setCount] = useState(0);
      const elementRef = useRef(null);
      const [hasAnimated, setHasAnimated] = useState(false);

      useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => {
            const [entry] = entries;
            if (entry.isIntersecting && !hasAnimated) {
              const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
              if (prefersReduced) {
                setCount(target);
                setHasAnimated(true);
                return;
              }

              let startTime = null;
              const animate = (timestamp) => {
                if (!startTime) startTime = timestamp;
                const elapsed = timestamp - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // easeOutExpo
                const easeProgress = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                
                setCount(Math.floor(easeProgress * target));

                if (progress < 1) {
                  requestAnimationFrame(animate);
                } else {
                  setCount(target);
                  setHasAnimated(true);
                }
              };
              requestAnimationFrame(animate);
            }
          },
          { threshold: 0.1 }
        );

        const currentEl = elementRef.current;
        if (currentEl) {
          observer.observe(currentEl);
        }

        return () => {
          if (currentEl) {
            observer.unobserve(currentEl);
          }
        };
      }, [target, duration, hasAnimated]);

      const displayedCount = format ? count.toLocaleString('pt-BR') : count;

      return (
        <span ref={elementRef}>
          {prefix}{displayedCount}{suffix}
        </span>
      );
    }

    // Custom Hook to manage scroll-based fade-in animations using IntersectionObserver
    const useScrollAnimation = () => {
      const elementsRef = useRef([]);

      useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => {
            entries.forEach((entry) => {
              if (entry.isIntersecting) {
                const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                if (prefersReduced) {
                  entry.target.classList.add('scroll-visible-instant');
                } else {
                  entry.target.classList.add('scroll-visible');
                }
                observer.unobserve(entry.target);
              }
            });
          },
          { threshold: 0.15, rootMargin: '0px 0px -50px 0px' }
        );

        const currentElements = elementsRef.current;
        currentElements.forEach((el) => {
          if (el) observer.observe(el);
        });

        return () => {
          currentElements.forEach((el) => {
            if (el) observer.unobserve(el);
          });
        };
      }, []);

      const addToRefs = (el) => {
        if (el && !elementsRef.current.includes(el)) {
          elementsRef.current.push(el);
        }
      };

      return addToRefs;
    };
